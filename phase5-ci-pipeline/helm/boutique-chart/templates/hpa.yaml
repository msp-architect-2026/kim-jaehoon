{{- range $svcName, $svc := .Values.services }}
{{- if and $svc.enabled $svc.hpa }}
{{- if $svc.hpa.enabled }}
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: {{ $svcName }}
  namespace: {{ $.Values.global.namespace | default "boutique" }}
  labels:
    app: {{ $svcName }}
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: {{ $svcName }}
  minReplicas: {{ $svc.hpa.minReplicas | default 1 }}
  maxReplicas: {{ $svc.hpa.maxReplicas | default 3 }}
  behavior:
    scaleDown:
      stabilizationWindowSeconds: {{ $.Values.hpa.scaleDownStabilizationWindow | default 60 }}
      policies:
        - type: Percent
          value: 100
          periodSeconds: 15
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: {{ $svc.hpa.cpuUtilization | default $.Values.hpa.defaultCpuUtilization | default 50 }}
{{- end }}
{{- end }}
{{- end }}
