{{- range $svcName, $svc := .Values.services }}
{{- if $svc.enabled }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ $svcName }}
  namespace: {{ $.Values.global.namespace }}
  labels:
    app: {{ $svcName }}
spec:
  type: ClusterIP
  selector:
    app: {{ $svcName }}
  ports:
    - name: {{ $svc.serviceProtocol | default "http" }}
      port: {{ $svc.servicePort }}
      targetPort: {{ $svc.serviceTargetPort | default $svc.containerPort }}
{{- end }}
{{- end }}
