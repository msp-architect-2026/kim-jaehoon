# ==============================================================================
# base/kustomization.yaml  (v2 — 로컬 파일 참조)
#
# 출처: Google Online Boutique kubernetes-manifests/ (직접 clone)
#
# 리소스(requests/limits) 수정 방법:
#   1. 이 레포 clone
#   2. apps/boutique/base/{서비스}.yaml 편집
#   3. git commit && git push
#   4. Argo CD Sync (또는 auto-sync 대기)
# ==============================================================================
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - ./network-policy.yaml
  - ./ingress.yaml
  - ./adservice.yaml
  - ./cartservice.yaml
  - ./checkoutservice.yaml
  - ./currencyservice.yaml
  - ./emailservice.yaml
  - ./frontend.yaml
  - ./paymentservice.yaml
  - ./productcatalogservice.yaml
  - ./recommendationservice.yaml
  - ./shippingservice.yaml
